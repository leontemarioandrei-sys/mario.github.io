<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Color Roll Game</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
    }

    .game {
      text-align: center;
    }

    .colors {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .box {
      width: 60px;
      height: 60px;
      border-radius: 10px;
    }

    .red { background: red; }
    .blue { background: blue; }
    .green { background: green; }
    .pink { background: hotpink; }
    .purple { background: purple; }
    .yellow { background: yellow; }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    .rules {
      width: 200px;
      border-left: 2px solid #ccc;
      padding-left: 20px;
    }
  </style>
</head>
<body>

<div class="game">
  <h1>🎮 Color Roll Game</h1>

  <div class="colors">
    <div id="c1" class="box"></div>
    <div id="c2" class="box"></div>
    <div id="c3" class="box"></div>
    <div id="c4" class="box"></div>
  </div>

  <h2 id="result">Apasă Roll</h2>

  <button onclick="roll()">🎲 Roll Again</button>
</div>

<div class="rules">
  <h3>📜 Reguli</h3>
  <p>1 culoare = WIN</p>
