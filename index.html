<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color Roll Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #14002b, #000010);
  color:white;
}

/* TITLU CENTRAT SUS /
.title{
  text-align:center;
  font-size:60px;
  margin-top:20px;
  text-shadow:0 0 20px #ff00ff, 0 0 40px #00ffff;
}

/ REGULI DREAPTA SUS /
.rules{
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:15px;
  width:220px;
  backdrop-filter: blur(10px);
}

/ CENTRU /
.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:80vh;
}

/ 4 CUTII /
.colors{
  display:flex;
  gap:15px;
  margin-bottom:25px;
}

.box{
  width:110px;
  height:110px;
  border-radius:18px;
  background:#222;
  box-shadow:0 0 15px rgba(255,255,255,0.2);
}

/ culori /
.red{background:red;}
.blue{background:dodgerblue;}
.green{background:limegreen;}
.pink{background:hotpink;}
.purple{background:purple;}
.yellow{background:gold;}

/ BUTON /
button{
  padding:15px 40px;
  font-size:22px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  background:linear-gradient(90deg,#ff00ff,#00ffff);
  color:black;
  font-weight:bold;
}

button:hover{
  transform:scale(1.05);
}

/ RESULT */
.result{
  margin-top:20px;
  font-size:35px;
}
</style>
</head>

<body>

<div class="title">🎰 COLOR ROLL GAME</div>

<div class="rules">
  <h3>📜 REGULI</h3>
  <p>1 culoare = WIN</p>
  <p>2 culori = LOSE</p>
  <p>3 culori = WIN</p>
  <p>4 culori = X3 (RAR)</p>
</div>

<div class="center">

  <div class="colors">
    <div class="box" id="c1"></div>
    <div class="box" id="c2"></div>
    <div class="box" id="c3"></div>
    <div class="box" id="c4"></div>
  </div>

  <button onclick="roll()">ROLL AGAIN 🎲</button>
<div class="result" id="result">Apasă Roll</div>

</div>

<script>

const colors=["red","blue","green","hotpink","purple","yellow"];

function roll(){

  let boxes=[
    document.getElementById("c1"),
    document.getElementById("c2"),
    document.getElementById("c3"),
    document.getElementById("c4")
  ];

  let picked=[];

  boxes.forEach(b=>{
    let c=colors[Math.floor(Math.random()*colors.length)];
    b.className="box "+c;
    picked.push(c);
  });

  let rand=Math.random();

  let result="";

  if(rand<0.55){
    result="🔥 WIN";
  }
  else if(rand<0.9){
    result="❌ LOSE";
  }
  else{
    result="💥 X3 (JACKPOT)";
  }

  document.getElementById("result").innerText=result;
}

</script>

</body>
</html>
﻿
