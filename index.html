<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color Roll Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e1b4b, #0f172a);
  color: white;
}

/* layout principal /
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 60px;
}

/ jocul din mijloc /
.game {
  text-align: center;
}

.title {
  font-size: 40px;
  margin-bottom: 20px;
}

/ cele 4 culori /
.colors {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-bottom: 20px;
}

.box {
  width: 90px;
  height: 90px;
  border-radius: 15px;
  background: #333;
  transition: 0.3s;
}

.red { background: red; }
.blue { background: blue; }
.green { background: green; }
.pink { background: hotpink; }
.purple { background: purple; }
.yellow { background: yellow; }

/ buton /
button {
  padding: 12px 25px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 15px;
}

button:hover {
  transform: scale(1.05);
}

/ reguli dreapta */
.rules {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 15px;
  width: 220px;
  backdrop-filter: blur(10px);
}

.rules h2 {
  margin-top: 0;
}

.result {
  font-size: 28px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

  <!-- JOC -->
  <div class="game">
    <div class="title">🎮 Color Roll Game</div>

    <div class="colors">
      <div class="box" id="c1"></div>
      <div class="box" id="c2"></div>
      <div class="box" id="c3"></div>
      <div class="box" id="c4"></div>
    </div>

    <button onclick="roll()">🎲 Roll Again</button>

    <div class="result" id="result">Apasă Roll</div>
  </div>

  <!-- REGULI -->
  <div class="rules">
    <h2>📜 Reguli</h2>
    <p>1 culoare = WIN</p>
    <p>2 culori = REJECT</p>
    <p>3 culori = WIN</p>
    <p>4 culori = X3</p>
  </div>

</div>
<script>
const colors = ["red","blue","green","hotpink","purple","yellow"];

function roll() {
  let boxes = [
    document.getElementById("c1"),
    document.getElementById("c2"),
    document.getElementById("c3"),
    document.getElementById("c4")
  ];

  let picked = [];

  boxes.forEach(box => {
    let c = colors[Math.floor(Math.random() * colors.length)];
    box.className = "box " + c;
    picked.push(c);
  });

  let unique = [...new Set(picked)].length;

  let result = "";

  if (unique === 1) result = "🔥 WIN";
  else if (unique === 2) result = "❌ REJECT";
  else if (unique === 3) result = "🔥 WIN";
  else if (unique === 4) result = "💥 X3";

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
