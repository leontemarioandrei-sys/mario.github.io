<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color Roll Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e1b4b, #0f172a);
  color: white;
}

/* layout principal /
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 60px;
}

/ jocul din mijloc /
.game {
  text-align: center;
}

.title {
  font-size: 40px;
  margin-bottom: 20px;
}

/ cele 4 culori /
.colors {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-bottom: 20px;
}

.box {
  width: 90px;
  height: 90px;
  border-radius: 15px;
  background: #333;
  transition: 0.3s;
}

.red { background: red; }
.blue { background: blue; }
.green { background: green; }
.pink { background: hotpink; }
.purple { background: purple; }
.yellow { background: yellow; }

/ buton /
button {
  padding: 12px 25px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 15px;
}

button:hover {
  transform: scale(1.05);
}

/ reguli dreapta */
.rules {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 15px;
  width: 220px;
  backdrop-filter: blur(10px);
}

.rules h2 {
  margin-top: 0;
}

.result {
  font-size: 28px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

  <!-- JOC -->
  <div class="game">
    <div class="title">🎮 Color Roll Game</div>

    <div class="colors">
      <div class="box" id="c1"></div>
      <div class="box" id="c2"></div>
      <div class="box" id="c3"></div>
      <div class="box" id="c4"></div>
    </div>

    <button onclick="roll()">🎲 Roll Again</button>

    <div class="result" id="result">Apasă Roll</div>
  </div>

  <!-- REGULI -->
  <div class="rules">
    <h2>📜 Reguli</h2>
    <p>1 culoare = WIN</p>
    <p>2 culori = REJECT</p>
    <p>3 culori = WIN</p>
    <p>4 culori = X3</p>
  </div>

</div>
<script>
const colors = ["red","blue","green","hotpink","purple","yellow"];

function roll() {
  let boxes = [
    document.getElementById("c1"),
    document.getElementById("c2"),
    document.getElementById("c3"),
    document.getElementById("c4")
  ];

  let picked = [];

  boxes.forEach(box => {
    let c = colors[Math.floor(Math.random() * colors.length)];
    box.className = "box " + c;
    picked.push(c);
  });

  let unique = [...new Set(picked)].length;

  let result = "";

  if (unique === 1) result = "🔥 WIN";
  else if (unique === 2) result = "❌ REJECT";
  else if (unique === 3) result = "🔥 WIN";
  else if (unique === 4) result = "💥 X3";

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>

<style>
body {

/* TITLU SUS /
.title {
  text-align: center;
  font-size: 50px;
  margin-top: 20px;
  text-shadow: 0 0 20px #00f, 0 0 40px #f0f;

.main {

  justify-content: center;
  align-items: center;

.game {
  text-align: center;

.colors {

.box {
  width: 110px;
  height: 110px;
  border-radius: 18px;

}

/ culori /
.red { background: red; }
.blue { background: dodgerblue; }
.green { background: limegreen; }
.pink { background: hotpink; }
.purple { background: purple; }
.yellow { background: gold; }

/ BUTON JOS /
button {
  margin-top: 20px;
  padding: 15px 40px;
  font-size: 22px;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  background: linear-gradient(90deg, #ff00ff, #00ffff);
  color: black;
  font-weight: bold;
}

button:hover {
  transform: scale(1.05);
}

/ RESULT /
.result {
  margin-top: 20px;
  font-size: 30px;
}

/ REGULI SUS DREAPTA */
.rules {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 15px;
  width: 220px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(255,255,255,0.2);

</style>
</head>

<body>

<div class="title">🎰 COLOR ROLL GAME</div>

<div class="rules">
  <h3>📜 REGULI</h3>

  <p>2 culori = REJECT</p>
  <p>3 culori = WIN</p>
  <p>4 culori = X3</p>
</div>

<div class="main">

  <div class="game">
<!-- 4 CULORI SUS -->
    <div class="colors">
      <div class="box" id="c1"></div>
      <div class="box" id="c2"></div>
      <div class="box" id="c3"></div>
      <div class="box" id="c4"></div>
    </div>

    <div class="result" id="result">Apasă Roll</div>
  <!-- BUTON JOS -->
    <button onclick="roll()">ROLL AGAIN 🎲</button>

  </div>

</div>

<script>

const colors = ["red","blue","green","hotpink","purple","yellow"];

function roll() {
  let boxes = [
    document.getElementById("c1"),
    document.getElementById("c2"),
    document.getElementById("c3"),
    document.getElementById("c4")
  ];

  let picked = [];

  boxes.forEach(b => {
    let c = colors[Math.floor(Math.random() * colors.length)];
    b.className = "box " + c;
    picked.push(c);
  });

  let unique = [...new Set(picked)].length;

  let result = "";

  if (unique === 1) result = "🔥 WIN";
  else if (unique === 2) result = "❌ REJECT";
  else if (unique === 3) result = "🔥 WIN";
  else result = "💥 X3";

  document.getElementById("result").innerText = result;
}

</script>

</body>
</html>
